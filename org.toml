[host.adele.disk-layouts.main]
layout = "main-workstation"
devices = "/dev/disk/by-id/ata-SanDisk_X400_M.2_2280_128GB_164787421747"

[host.pelle]
rescueMode = true
endpoint = "pelle.kompismoln.se"
id = 9
users = ["admin", "alex"]
roles = [
  "nixos",
  "peer",
  "server",
  "inference-server",
  "substituter",
]
vpns = [
  "wg0",
  "wg1",
  "wg2",
]
system = "x86_64-linux"
stateVersion = "25.11"
network.eth = { interface = "enp5s0", mode = "dhcp" }
network.wifi = { interface = "wlp4s0", mode = "dhcp" }

[host.pelle.home]
alex.roles = ["cli-devstation"]

[host.pelle.disk-layouts.main]

gateway4 = "172.31.1.1"
address = "2a01:4f9:c012:e514::1/64"
gateway = "fe80::1"
dns = [
  "185.12.64.1",
  "185.12.64.2",
  "2a01:4ff:ff00::add:1",
  "2a01:4ff:ff00::add:2",
]

[host.helsinki.disk-layouts.main]

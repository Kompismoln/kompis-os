[user.admin]
description = "Administrator"
mail = true
email = "admin@kompismoln.se"
grants = ["host-*"]
inboxes = [
  "info@kompismoln.se",
  "postmaster@kompismoln.se",
  "abuse@kompismoln.se",
]

[user.ami]
description = "AMI"
grants = ["host-adele"]

[user.alex]
mail = true
description = "Alexander Holmbäck"
email = "alex@kompismoln.se"
inboxes = ["alex@ahbk.se", "alex@klimatkalendern.nu"]
grants = [
  "host-lenovo",
  "host-pelle",
  "host-helsinki",
  "host-laptop",
]

[user.jo]

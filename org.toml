# org.toml
name = "Kompismoln"
endpoint = "kompismoln.se"
contact = "info@kompismoln.se"
timezone = "Europe/Stockholm"
locale = "en_US.UTF-8"
prefix = "fd17:9247:d916"
prefix4 = "10.0"
build-hosts = ["pelle", "stationary"]
namespaces = ["km1", "km", "kompismoln.se"]

[flake]
type = "github"
owner = "Kompismoln"
repo = "kompis-os"

[vpn.wg0]
id = 0
trusted = true
gateway = "helsinki"
namespace = "km"
dns = ["helsinki"]

[vpn.wg1]
id = 1
trusted = true
gateway = "stationary"
proxy = true
namespace = "km1"
dns = ["stationary"]

[vpn.wg2]
id = 2
trusted = true
gateway = "pelle"
namespace = "km2"
dns = ["pelle"]

[mailserver]
dkimSelector = "k1"
host = "helsinki"
int = "helsinki.km"
ext = "mail.kompismoln.se"

[domain."kompismoln.se"]
mailbox = true

[domain."chatddx.com"]
mailbox = true

[domain."sverigesval.org"]
mailbox = true

[domain."ahbk.se"]
mailbox = true

[domain."esse.nu"]
mailbox = false

[domain."klimatkalendern.nu"]
mailbox = false

[host.stationary]
id = 1
roles = [
  "nixos",
  "peer",
  "server",
  "app-scheduler",
]
vpns = [
  "wg0",
  "wg1",
  "wg2",
]
endpoint = "stationary.kompismoln.se"
system = "x86_64-linux"
stateVersion = "25.05"

[host.stationary.network.enp3s0]
role = "external"
mode = "dhcp"

[host.stationary.disk-layouts.main]
module = "main-server-zfs-test"
device = "/dev/disk/by-id/ata-CT500MX500SSD1_1845E1D53DBC"

[host.stationary.disk-layouts.single-xfs]
module = "single-xfs"
device = "/dev/disk/by-id/ata-TOSHIBA_MK2555GSX_59EIS0BNS"
mountpoint = "/srv/xfs-1"

[host.stationary.disk-layouts.tungsten]
module = "raid1-xfs"
disks.one.device = "/dev/disk/by-id/ata-WDC_WD10EACS-00D6B0_WD-WCAU44065762"
disks.two.device = "/dev/disk/by-id/ata-WDC_WD10EACS-00D6B0_WD-WCAU44323396"
mountpoint = "/srv/tungsten"

[host.lenovo]
id = 7
roles = [
  "nixos",
  "peer",
  "rice",
]
vpns = [
  "wg0",
  "wg1",
  "wg2",
]
system = "x86_64-linux"
stateVersion = "24.11"
# disk-layouts.main-workstation.device = "/dev/disk/by-id/nvme-SAMSUNG_MZVLW256HEHP-000L7_S35ENX0J617479"
home.alex.roles = ["hypr-devstation", "rice"]

[host.lenovo.network.eth0]
role = "external"
mode = "dhcp"

[host.lenovo.network.wlp3s0]
role = "wifi"
mode = "dhcp"

[host.lenovo.desktop]
audio-bus-id = "pci-0000_00_1f.3"
kb-layout = "us,se"

[[host.lenovo.monitors]]
output = "eDP-1"
mode = "preferred"
position = "auto"

[[host.lenovo.monitors]]
output = "HDMI-A-2"
mode = "1920x1080@60"
position = "auto"
scale = 1

[[host.lenovo.devices]]
name = "epic-mouse-v1"
sensitivity = -0.5

[[host.lenovo.devices]]
name = "wacom-intuos-pt-m-pen"
transform = 0
output = "HDMI-A-1"

[host.laptop]
id = 2
roles = [
  "nixos",
  "peer",
  "hypr-mediastation",
]
vpns = [
  "wg0",
  "wg1",
  "wg2",
]
system = "x86_64-linux"
stateVersion = "26.05"
home.alex.roles = ["hypr-mediastation"]

[host.laptop.network.eth0]
role = "external"
mode = "dhcp"

[host.laptop.network.wlp1s0]
role = "wifi"
mode = "dhcp"

[host.laptop.desktop]
kb-layout = "us,se"

[host.laptop.disk-layouts.main]
module = "main-media"
device = "/dev/disk/by-id/ata-KINGSTON_SA400S37240G_50026B77858A5120"

[host.phone]
id = 4
roles = ["peer"]
vpns = [
  "wg0",
  "wg1",
  "wg2",
]
system = "aarch64-linux"


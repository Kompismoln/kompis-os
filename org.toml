# org.toml
name = "Kompismoln"
endpoint = "kompismoln.se"
contact = "info@kompismoln.se"
timezone = "Europe/Stockholm"
locale = "en_US.UTF-8"
prefix = "fd17:9247:d916"
prefix4 = "10.0"
build-hosts = ["pelle", "stationary"]
root-identities = ["root-1"]
namespaces = ["km", "km1", "kompismoln.se"]

[vpn.wg0]
id = 0
trusted = true
gateway = "helsinki"
namespace = "km"
dns = ["helsinki"]

[vpn.wg1]
id = 1
trusted = true
gateway = "stationary"
proxy = true
namespace = "km1"
dns = ["stationary"]

[vpn.wg2]
id = 2
trusted = true
gateway = "pelle"
namespace = "km2"
dns = ["pelle"]

[mailserver]
dkimSelector = "k1"
host = "helsinki"
int = "helsinki.km"
ext = "mail.kompismoln.se"

[flake]
type = "github"
owner = "Kompismoln"
repo = "kompis-os"

[domain."kompismoln.se"]
mailbox = true

[domain."chatddx.com"]
mailbox = true

[domain."sverigesval.org"]
mailbox = true

[domain."ahbk.se"]
mailbox = true

[domain."esse.nu"]
mailbox = false

[domain."klimatkalendern.nu"]
mailbox = false

[public-artifacts]
default = "public-keys/$class-$entity-$key.pub"
tls-cert = "public-keys/$class-$entity-$key.pem"

[secrets]
default = "enc/$class-$entity.yaml"
root = "keys/$class-$entity"

[class.root]
keys = ["age-key"]

[class.host]
keys = [
  "age-key",
  "ssh-key",
  "wg0-key",
  "wg1-key",
  "wg2-key",
  "luks-key",
]

[class.service]
keys = [
  "age-key",
  "ssh-key",
  "mail",
  "passwd",
  "secret-key",
  "tls-cert",
  "nix-sign",
]

[class.user]
keys = [
  "age-key",
  "ssh-key",
  "mail",
  "passwd",
  "restic-key",
]

[class.app]
keys = [
  "age-key",
  "ssh-key",
  "secret-key",
  "restic-key",
]

[class.store]
keys = [
  "age-key",
  "ssh-key",
]

[ops.rebuild]
"*" = ["rebuild:age-key"]

[ops.align]
"*" = ["align:age-key"]

[ops.check]
"host:luks+server" = ["check:luks-key"]
"host:server" = ["check:age-key", "check:ssh-key"]
"host-lenovo" = ["check:age-key", "check:ssh-key"]

[ops.verify-identities]
"*" = ["verify:age-key"]

[ops.verify-users]
"user-*" = ["verify:ssh-key", "verify:passwd", "verify:mail"]

[ops.verify-hosts]
"host-*" = ["verify:wg0-key", "verify:wg1-key"]

[ops.verify-services]
"service-*" = [
  "verify:ssh-key",
  "verify:tls-cert",
  "verify:passwd",
  "verify:mail",
]

[root.1]

[host.stationary]
rescueMode = true
id = 1
boot = "grub"
users = ["admin"]
roles = [
  "nixos",
  "peer",
  "server",
  "app-scheduler",
  "substituter",
]
endpoint = "stationary.kompismoln.se"
vpns = [
  "wg0",
  "wg1",
  "wg2",
]
system = "x86_64-linux"
stateVersion = "25.05"
network.eth = { interface = "enp3s0", mode = "dhcp" }

[host.stationary.disk-layouts.main]
layout = "main-server-zfs-test"
devices = "/dev/disk/by-id/ata-CT500MX500SSD1_1845E1D53DBC"

[host.stationary.disk-layouts.single-xfs]
layout = "single-xfs"
devices = "/dev/disk/by-id/ata-TOSHIBA_MK2555GSX_59EIS0BNS"
mountpoint = "/srv/xfs-1"

[host.stationary.disk-layouts.tungsten]
layout = "raid1-xfs"
devices = [
  "/dev/disk/by-id/ata-WDC_WD10EACS-00D6B0_WD-WCAU44065762",
  "/dev/disk/by-id/ata-WDC_WD10EACS-00D6B0_WD-WCAU44323396"
]
mountpoint = "/srv/tungsten"

[host.lenovo]
id = 7
users = ["admin", "alex"]
roles = ["nixos", "peer"]
vpns = [
  "wg0",
  "wg1",
  "wg2",
]
system = "x86_64-linux"
stateVersion = "24.11"
# disk-layouts.main-workstation.devices = "/dev/disk/by-id/nvme-SAMSUNG_MZVLW256HEHP-000L7_S35ENX0J617479"
home.alex.roles = ["hypr-devstation", "rice"]

network.eth.interface = "enp0s31f6"
network.wifi.interface = "wlp3s0"

[host.lenovo.desktop]
audio-bus-id = "pci-0000_00_1f.3"
kb-layout = "us,se"
screenshotPath = "~/Pictures/Screenshots"
autolock = true

[[host.lenovo.monitors]]
output = "eDP-1"
mode = "preferred"
position = "auto"

[[host.lenovo.monitors]]
output = "HDMI-A-2"
mode = "1920x1080@60"
position = "auto"
scale = 1

[[host.lenovo.devices]]
name = "epic-mouse-v1"
sensitivity = -0.5

[[host.lenovo.devices]]
name = "wacom-intuos-pt-m-pen"
transform = 0
output = "HDMI-A-1"

[host.laptop]
rescueMode = true
id = 2
boot = "grub"
users = ["admin", "alex"]
roles = ["nixos", "peer"]
vpns = ["wg0", "wg1", "wg2"]
system = "x86_64-linux"
stateVersion = "26.05"
home.alex.roles = ["hypr-mediastation"]

network.eth = { interface = "eth0", mac = "6c:6e:07:24:a4:dd", mode = "dhcp" }
network.wifi.interface = "wlp1s0"

[host.laptop.desktop]
kb-layout = "us,se"
screenshotPath = "~/Pictures/Screenshots"
autolock = false

[host.laptop.disk-layouts.main]
layout = "main-media"
devices = "/dev/disk/by-id/ata-KINGSTON_SA400S37240G_50026B77858A5120"

[host.phone]
id = 4
roles = ["peer"]
vpns = ["wg0", "wg1"]
system = "aarch64-linux"
stateVersion = ""

[host.helsinki]
rescueMode = true
id = 5
boot = "grub"
system = "x86_64-linux"
stateVersion = "25.05"
endpoint = "helsinki.kompismoln.se"
users = ["admin"]
vpns = [
  "wg0",
  "wg1",
  "wg2",
]
roles = [
  "nixos",
  "peer",
  "server",
  "mailserver",
  "app-scheduler",
]

[host.helsinki.network.eth]
interface = "enp1s0"
mode = "static"
metric = 512
address4 = "65.108.214.112"
prefixLength4 = 32
gateway4 = "172.31.1.1"
destination4 = "0.0.0.0/0"
address = "2a01:4f9:c012:e514::1"
prefixLength = 64
gateway = "fe80::1"
gatewayOnLink = true
destination = "::/0"
dns = [
  "185.12.64.1",
  "185.12.64.2",
  "2a01:4ff:ff00::add:1",
  "2a01:4ff:ff00::add:2",
]

[host.helsinki.disk-layouts.main]
layout = "main-server-btrfs"
devices = "/dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_101498674"

[host.friday]
rescueMode = true
id = 6
users = ["admin", "johanna"]
hardwareReport = "standard"
roles = ["nixos", "peer"]
vpns = ["wg0", "wg1"]
system = "x86_64-linux"
stateVersion = "20.03"

[host.adele]
rescueMode = true
id = 8
users = ["admin", "ami"]
system = "x86_64-linux"
stateVersion = "25.11"
vpns = [
  "wg0",
  "wg1",
  "wg2",
]
roles = ["nixos", "peer", "comfy-root"]
home.ami.roles = ["cinnamon-office"]

network.wifi.interface = "wlp1s0"

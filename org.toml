devices = "/dev/disk/by-id/nvme-WDC_WD_BLACK_SDBPNTY-1T00-1106_21351R802985"

[host.bootstrap]
rescueMode = true
id = 254
roles = ["nixos", "peer"]
vpns = ["wg0"]
system = "x86_64-linux"
stateVersion = "25.11"

[host.debian]
id = 253
system = "x86_64-linux"
stateVersion = "23.11"

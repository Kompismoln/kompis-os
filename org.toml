[role.nixos]
services = [
  "rescue",
]

[role.peer]
services = [
  "rescue",
  "locksmith",
  "nix-build",
  "nix-push",
  "nix-switch",
]

[role.comfy-root]
services = []

[role.server]
services = [
  "egress-proxy",
  "reverse-tunnel",
]

[role.inference-server]
services = [
  "vllm",
]
stores = [
  "huggingface",
]

[role.home-manager]
services = []

[role.workstation]
services = []

[role.mailserver]
services = [
  "dmarc-reports",
]

[role.app-scheduler]
services = []

[role.substituter]
services = ["nix-serve"]

[role.hypr-devstation]
services = []

[role.archive]
services = ["backup"]

[service.backup]
grants = ["host-*"]

[service.locksmith]
id = 0
principal.hasBash = true

grants = ["host-*"]

[service.egress-proxy]
id = 7
grants = ["host:server"]

[service.reverse-tunnel]
id = 1
principal.hasPasswd = true
grants = ["host:server"]

[service.vllm]
id = 9
grants = ["host:inference-server"]
principal.hasHome = true
principal.groups = ["video", "render", "huggingface"]

[service.nix-build]
id = 2
principal.hasHome = true
principal.hasBash = true

grants = ["host-*"]

[service.nix-push]
id = 4
principal.hasBash = true
grants = ["host-*"]

[service.nix-switch]
id = 3
principal.hasBash = true
grants = ["host-*"]

[service.nix-serve]
grants = ["host-*"]

[service.rescue]
grants = ["host-*"]

[service.dmarc-reports]
